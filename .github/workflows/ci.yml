name: CI

# Builds the site, typechecks, and runs the SEO audit (scripts/seo-audit.mjs)
# on every push/PR. The audit fails the job on any ERROR-level finding — e.g.
# a canonical URL left with no incoming internal links — so SEO regressions
# are caught before they ship to gabrielm.dev.
#
# Uses Bun to match the Cloudflare deploy workflow (the repo ships a Bun
# lockfile, not package-lock.json).
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Generates .astro/types.d.ts (gitignored) so tsgo sees Astro's
      # ImportMeta augmentation (import.meta.env) — otherwise typecheck fails
      # on a clean checkout.
      - name: Generate Astro types
        run: bun run astro sync

      - name: Typecheck
        run: bun run typecheck

      - name: SEO audit (build + crawl)
        run: bun run build && bun scripts/seo-audit.mjs
