name: Deploy to Cloudflare

# Builds the static Astro site and deploys it to Cloudflare Workers
# (gabrielm.dev) on every push to main. Requires a repo secret:
#   CLOUDFLARE_API_TOKEN  — create via Cloudflare dashboard -> My Profile ->
#   API Tokens -> "Edit Cloudflare Workers" template.
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: cloudflare-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          command: deploy
