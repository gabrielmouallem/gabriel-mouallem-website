name: Deploy GitHub Pages redirect

# The real site now lives at https://gabrielm.dev (Cloudflare Workers).
# GitHub Pages serves only a redirect stub so the old project URL
# (gabrielmouallem.github.io/gabriel-mouallem-website) forwards old inbound
# links to the new domain and passes SEO signals via canonical + meta refresh.
on:
  push:
    branches: [main]
    paths:
      - gh-pages-redirect/**
      - .github/workflows/deploy.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Upload redirect stub
        uses: actions/upload-pages-artifact@v3
        with:
          path: gh-pages-redirect

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
